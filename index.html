<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HEILOG - Assistente de Logística (Simplificado)</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Tone.js para efeitos sonoros -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.7.77/Tone.js"></script>

  <!-- IMask.js para máscaras de formulário -->
  <script src="https://unpkg.com/imask"></script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --heineken-green: #00904A;
      --heineken-red: #E50025;
      --dark-bg: #174017;
      --text-light: #f3f4f6;
    }
    body { font-family: 'Roboto', sans-serif; background-color: var(--dark-bg); color: var(--text-light); }
    .font-title { font-family: 'Oswald', sans-serif; }
    .transition-all { transition: all 0.3s ease-in-out; }
    .card { background-color: rgba(0, 0, 0, 0.3); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    .form-input, .form-select { background-color: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.2); color: white; }
    .form-input:focus, .form-select:focus { border-color: var(--heineken-green); box-shadow: 0 0 0 2px rgba(0, 144, 74, 0.5); outline: none; }
    .btn-green { background-color: var(--heineken-green); color: white; font-weight: bold; }
    .btn-green:hover { background-color: #007a3f; }
    .btn-ghost { background: rgba(255,255,255,0.08); color: white; border: 1px solid rgba(255,255,255,0.12); font-weight: 700; }
    .btn-ghost:hover { background: rgba(255,255,255,0.14); }
    .btn-danger { background-color: var(--heineken-red); color: white; font-weight: bold; }
    .btn-danger:hover { background-color: #c6001f; }
    .form-input.invalid { border-color: var(--heineken-red); box-shadow: 0 0 0 2px rgba(229, 0, 37, 0.5); }

    #call-panel-overlay { position: fixed; inset: 0; background-color: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 1000; }
    @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    #call-panel-content { padding: 3rem; border-radius: 1rem; text-align: center; color: #1a202c; animation: fadeIn 0.3s ease-out; }

    /* Popup de confirmação das placas */
    #plate-confirm-overlay {
      position: fixed;
      inset: 0;
      background-color: rgba(0,0,0,0.82);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1100;
      padding: 1rem;
    }

    #plate-confirm-modal {
      width: 100%;
      max-width: 520px;
      border-radius: 22px;
    }

    .plate-line {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 14px;
      padding: 12px 14px;
    }

    .plate-line .label {
      font-size: 0.85rem;
      opacity: 0.8;
      margin-bottom: 4px;
    }

    .plate-line .value {
      font-size: 1.35rem;
      font-weight: 900;
      letter-spacing: 0.08em;
    }


    /* Checklist impresso após a marcação */
    .print-page-break {
      break-before: page;
      page-break-before: always;
      height: 0;
    }

    .checklist-page {
      background: #fff;
      color: #000;
      padding: 8px;
      font-family: Arial, sans-serif;
      font-size: 10px;
      line-height: 1.15;
    }

    .checklist-title {
      text-align: center;
      font-weight: 900;
      font-size: 18px;
      margin-bottom: 4px;
      letter-spacing: 0.04em;
    }

    .checklist-subtitle {
      text-align: center;
      font-size: 10px;
      margin-bottom: 8px;
    }

    .checklist-meta {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 8px;
      table-layout: fixed;
    }

    .checklist-meta td {
      border: 1px solid #000;
      padding: 4px 5px;
      vertical-align: top;
      word-wrap: break-word;
    }

    .checklist-section-title {
      background: #e5e7eb;
      border: 1px solid #000;
      font-weight: 900;
      padding: 4px 6px;
      margin-top: 6px;
      margin-bottom: 0;
      text-transform: uppercase;
    }

    .checklist-hint {
      border: 1px solid #000;
      border-top: 0;
      padding: 4px 6px;
      font-size: 9px;
      background: #fafafa;
    }

    .checklist-table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      margin-bottom: 6px;
    }

    .checklist-table th,
    .checklist-table td {
      border: 1px solid #000;
      padding: 3px 4px;
      vertical-align: middle;
    }

    .checklist-table th {
      background: #f3f4f6;
      font-weight: 900;
    }

    .checklist-table .n-col {
      width: 26px;
      text-align: center;
      font-weight: 700;
    }

    .checklist-table .check-col {
      width: 34px;
      text-align: center;
      font-weight: 900;
      font-size: 12px;
    }

    .checklist-table .obs-col {
      width: 86px;
    }

    .check-inline {
      display: inline-block;
      margin-right: 14px;
      margin-bottom: 3px;
      font-weight: 700;
    }

    .checklist-split {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .checklist-signature-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 4px;
      margin-bottom: 6px;
    }

    .checklist-signature-box {
      border: 1px solid #000;
      min-height: 46px;
      padding: 4px 6px;
    }

    .checklist-signature-box .sig-label {
      font-weight: 700;
      margin-bottom: 16px;
    }

    .checklist-footer {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      margin-top: 8px;
      font-size: 9px;
      font-weight: 700;
    }

    .checklist-priority-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 6px;
      margin-top: 8px;
      font-size: 9px;
      font-weight: 900;
      text-align: center;
    }

    .checklist-priority-row div {
      border: 1px solid #000;
      padding: 4px;
      background: #f9fafb;
    }


    /* Checklist impresso - modelo espelhado do XLSM */
    .xl-check-page {
      background: #fff;
      color: #000;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 9.6px;
      line-height: 1.1;
      padding: 0;
    }

    .xl-check-wrap {
      border: 1px solid #000;
      width: 100%;
    }

    .xl-check-table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    .xl-check-table td,
    .xl-check-table th {
      border: 1px solid #000;
      padding: 2px 3px;
      vertical-align: middle;
      word-wrap: break-word;
    }

    .xl-center { text-align: center; }
    .xl-right { text-align: right; }
    .xl-bold { font-weight: 700; }
    .xl-heavy { font-weight: 900; }
    .xl-small { font-size: 9.4px; }
    .xl-xsmall { font-size: 8.1px; }
    .xl-red { color: #d90000; font-weight: 700; }
    .xl-green-header { background: #d8e4bc; font-weight: 700; text-align: center; }
    .xl-gray-header { background: #efefef; font-weight: 900; text-align: center; }
    .xl-section-title {
      border-top: 1px solid #000;
      border-bottom: 1px solid #000;
      background: #efefef;
      text-align: center;
      font-weight: 900;
      font-size: 10.8px;
      padding: 2px 4px;
      text-transform: uppercase;
    }

    .xl-header-grid {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    .xl-header-grid td {
      border: 1px solid #000;
      padding: 0;
      vertical-align: middle;
    }

    .xl-header-brand {
      padding: 4px 10px !important;
      height: 58px;
      background: #fff;
    }

    .xl-brand-flex {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
    }

    .xl-brand-logo {
      display: block;
      width: 100%;
      max-width: 390px;
      height: 50px;
      background-repeat: no-repeat;
      background-position: left center;
      background-size: contain;
      print-color-adjust: exact;
      -webkit-print-color-adjust: exact;
    }

    .xl-header-title {
      text-align: center;
      font-weight: 900;
      font-size: 14.5px;
      letter-spacing: 0.01em;
      padding: 0 6px !important;
    }

    .xl-header-datetime {
      font-size: 9.2px;
      font-weight: 700;
      width: 138px;
    }

    .xl-under-row {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      white-space: nowrap;
    }

    .xl-line {
      display: inline-block;
      border-bottom: 1px solid #000;
      min-width: 76px;
      height: 10px;
      padding: 0 2px;
      vertical-align: bottom;
      font-weight: 700;
    }

    .xl-line.sm { min-width: 60px; }
    .xl-line.md { min-width: 92px; }
    .xl-line.lg { min-width: 120px; }
    .xl-line.xl { min-width: 180px; }

    .xl-check-inline {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      margin: 0 6px 0 0;
      white-space: nowrap;
      font-weight: 700;
    }

    .xl-box {
      display: inline-block;
      width: 16px;
      height: 11px;
      border: 1px solid #000;
      line-height: 11px;
      text-align: center;
      font-weight: 900;
      font-size: 8px;
    }

    .xl-box.big {
      width: 12px;
      height: 12px;
      line-height: 12px;
    }

    .xl-transport {
      padding: 5px 8px 4px;
    }

    .xl-transport-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 4px;
      flex-wrap: wrap;
    }

    .xl-transport-row.center-tight { gap: 12px; }
    .xl-check-groups {
      text-align: center;
      padding: 5px 8px 4px;
    }

    .xl-group-row {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin-bottom: 4px;
      flex-wrap: wrap;
    }

    .xl-two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      padding: 3px 5px 4px;
    }

    .xl-question-table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      font-size: 7px;
    }

    .xl-question-table td,
    .xl-question-table th {
      border: 1px solid #000;
      padding: 1px 2px;
      vertical-align: middle;
    }

    .xl-qtext { width: auto; font-weight: 700; }
    .xl-yn { width: 28px; text-align: center; }
    .xl-yncell { height: 17px; text-align: center; }

    .xl-comments-box {
      border: 1px solid #000;
      min-height: 52px;
      margin-top: 6px;
      padding: 3px 5px;
    }

    .xl-comments-title {
      text-align: center;
      font-weight: 700;
      margin-bottom: 2px;
    }

    .xl-decision-row {
      display: flex;
      gap: 12px;
      margin-top: 6px;
      align-items: center;
    }

    .xl-decision-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-weight: 700;
    }

    .xl-sign-stack {
      padding: 16px 14px 0;
      font-size: 9px;
    }

    .xl-sign-line {
      margin-bottom: 10px;
      white-space: nowrap;
      font-weight: 700;
    }

    .xl-sign-line .xl-line {
      min-width: 120px;
    }

    .xl-sign-line.small-gap { margin-bottom: 6px; }

    .xl-important-red {
      color: #d90000;
      font-weight: 700;
      text-align: left;
      padding: 3px 6px 1px;
      font-size: 6px;
      line-height: 1.1;
    }

    .xl-split-section {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      padding: 3px 5px 4px;
    }

    .xl-subhead {
      border: 1px solid #000;
      border-bottom: 0;
      background: #d8e4bc;
      text-align: center;
      font-weight: 900;
      font-size: 8px;
      padding: 2px 3px;
    }

    .xl-subhead.red {
      color: #d90000;
    }

    .xl-bottom-area {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 6px;
      padding: 4px 3px 1px;
    }

    .xl-doc-meta {
      text-align: right;
      font-size: 6px;
      line-height: 1.1;
      min-width: 100px;
    }

    .xl-priorities {
      display: flex;
      justify-content: center;
      gap: 30px;
      padding: 4px 0 1px;
      font-size: 9px;
      font-weight: 900;
    }

    .xl-priority-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 9px;
    }

    .xl-check-page,
    .xl-check-wrap {
      page-break-inside: avoid;
      break-inside: avoid-page;
    }

    @media print {
      .xl-check-page {
        font-size: 7.8px;
        zoom: 0.89;
      }
      .xl-header-title { font-size: 13px; }
      .xl-section-title { font-size: 9.6px; }
      .xl-priorities { gap: 24px; }
      .xl-brand-logo { height: 44px; }
    }


    @media print {
      @page {
        size: A4 portrait;
        margin: 6mm;
      }

      .checklist-page {
        padding: 0;
        font-size: 8px;
      }

      .checklist-table th,
      .checklist-table td,
      .checklist-meta td,
      .checklist-signature-box,
      .checklist-section-title,
      .checklist-hint {
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
    }

    /* ✅ NÃO MOSTRAR A FOLHA NA TELA (só no print) */
    #printable-area { position: fixed; left: -10000px; top: 0; width: 100%; }

    @media print {
      body * { visibility: hidden; }
      #printable-area, #printable-area * { visibility: visible; }
      #printable-area { position: absolute; left: 0; top: 0; width: 100%; }
      .print-main-container { border: 4px solid black !important; padding: 0.75rem; color: black !important; }
      #app-container, #call-panel-overlay, #plate-confirm-overlay { display: none !important; }
    }

    /* Menu tiles (modo inicial) - mantido mas não usado no modo simplificado */
    .mode-tile { min-height: 74px; }
    .mode-tile .emoji { font-size: 26px; line-height: 1; }
    .mode-tile .label { font-size: 0.98rem; }

    /* Alto contraste (somente nas opções) */
    .hc .mode-btn {
      background: rgba(255,255,255,0.12);
      border-color: rgba(255,255,255,0.25);
    }
    .hc .mode-btn:hover { background: rgba(255,255,255,0.18); }
    .hc .mode-btn:focus { outline: 2px solid rgba(0, 144, 74, 0.65); outline-offset: 2px; }

    /* ===== UI SIMPLIFICADA (CAMINHONEIRO) ===== */
    .simple-ui .card { border-radius: 22px; }
    .simple-ui .big-title { font-size: 1.35rem; font-weight: 800; }
    .simple-ui .help { color: rgba(243,244,246,0.85); font-size: 0.95rem; line-height: 1.25rem; }

    .simple-ui .btn-xl {
      width: 100%;
      padding: 18px 16px;
      border-radius: 18px;
      font-weight: 900;
      font-size: 1.15rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }
    .simple-ui .btn-xl .left { display: flex; align-items: center; gap: 12px; }
    .simple-ui .btn-xl .emoji { font-size: 28px; }
    .simple-ui .btn-xl .desc { font-size: 0.85rem; font-weight: 600; opacity: .85; margin-top: 2px; }

    .simple-ui .input-xl, .simple-ui .select-xl {
      width: 100%;
      padding: 16px 14px;
      border-radius: 16px;
      font-size: 1.05rem;
    }

    .simple-ui .section {
      background: rgba(0,0,0,0.20);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 18px;
      padding: 14px;
    }

    .simple-ui details summary {
      cursor: pointer;
      user-select: none;
      font-weight: 800;
    }
    .simple-ui details summary::marker { font-size: 1.1em; }

    .simple-ui .sticky-actions {
      position: sticky;
      bottom: 0;
      background: linear-gradient(to top, rgba(23,64,23,1), rgba(23,64,23,0.75));
      padding-top: 12px;
    }

    .simple-ui .badge {
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 0.85rem;
      font-weight: 900;
      background: rgba(255,255,255,0.10);
      border: 1px solid rgba(255,255,255,0.12);
    }

    .simple-ui .step {
      font-size: 0.9rem;
      font-weight: 900;
      opacity: .9;
      margin-bottom: 8px;
    }

    .simple-ui .divider { height:1px; background: rgba(255,255,255,0.10); margin: 12px 0; }
  </style>
</head>

<body class="antialiased simple-ui">
  <!-- Painel de Chamada -->
  <div id="call-panel-overlay">
    <div id="call-panel-content" class="w-full max-w-2xl">
      <h2 id="call-panel-message" class="text-4xl md:text-6xl font-bold uppercase mb-6"></h2>
      <button id="close-panel-btn" class="bg-white/80 hover:bg-white text-gray-800 font-bold py-3 px-8 rounded-lg transition-all">Fechar</button>
    </div>
  </div>

  <!-- Popup de confirmação das placas -->
  <div id="plate-confirm-overlay">
    <div id="plate-confirm-modal" class="card shadow-2xl p-6 space-y-4">
      <div class="text-center">
        <h3 class="font-title text-3xl text-white uppercase">Confira se as placas estão corretas</h3>
        <p class="help mt-2">
          Se estiver algo errado, toque em <b>Alterar</b>.
          Se estiver tudo certo, toque em <b>Confirmar e Imprimir</b>.
        </p>
      </div>

      <div class="space-y-3">
        <div class="plate-line">
          <div class="label text-gray-300">Placa do cavalo</div>
          <div id="confirm-truck-plate" class="value text-white">-</div>
        </div>

        <div class="plate-line">
          <div class="label text-gray-300">Placa da carreta</div>
          <div id="confirm-trailer-plate" class="value text-white">-</div>
        </div>
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 pt-2">
        <button id="plate-confirm-edit-btn" class="btn-ghost w-full py-4 rounded-xl text-lg font-extrabold">
          Alterar
        </button>
        <button id="plate-confirm-print-btn" class="btn-green w-full py-4 rounded-xl text-lg font-extrabold">
          Confirmar e Imprimir
        </button>
      </div>
    </div>
  </div>

  <div id="app-container" class="min-h-screen flex flex-col items-center justify-center p-4">
    <div class="w-full max-w-md card shadow-2xl rounded-2xl p-8 space-y-6">
      <div class="text-center">
        <svg class="w-20 h-20 mx-auto mb-2" viewBox="0 0 24 24" fill="#E50025" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21 12 17.27z"/>
        </svg>
        <h1 class="font-title text-5xl font-bold text-white uppercase tracking-wider">HEILOG</h1>
        <p class="text-gray-400 mt-1">Seu assistente de logística.</p>
      </div>

      <div id="action-area" class="space-y-4"></div>
      <div id="results-area" class="pt-2 min-h-[5rem]"></div>

      <div class="text-center pt-4 border-t border-gray-700/50">
        <p id="file-status" class="text-yellow-400 text-xs h-4"></p>
      </div>
    </div>
  </div>

  <div id="printable-area"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, setLogLevel } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    // --- Constantes ---
    const GOOGLE_SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSHLJspPB5rUhpKWTUFGrtMeksd24eu1-I_l5S2qkhgFsie6cn1hITIUmr3k-ZuL4stm1x8MT0mC30s/pub?output=csv';
    const CORS_PROXY_URL = 'https://api.allorigins.win/raw?url=';
    const EXTRA_PROXY_BUILDERS = [
      (url) => `https://corsproxy.io/?${encodeURIComponent(url)}`,
      (url) => `https://api.codetabs.com/v1/proxy/?quest=${encodeURIComponent(url)}`,
    ];
    const FETCH_TIMEOUT_MS = 15000;
    const REFRESH_INTERVAL = 300000; // 5 min

    // --- DOM ---
    const fileStatus = document.getElementById('file-status');
    const resultsArea = document.getElementById('results-area');
    const actionArea = document.getElementById('action-area');
    const callPanelOverlay = document.getElementById('call-panel-overlay');
    const callPanelContent = document.getElementById('call-panel-content');
    const callPanelMessage = document.getElementById('call-panel-message');
    const closePanelBtn = document.getElementById('close-panel-btn');

    // --- Estado ---
    let db, auth, appId;
    let isAuthReady = false;
    let database = [];
    let headers = [];
    let headerMap = {};
    let panelTimeout;

        const baseUrl = `${GOOGLE_SHEET_CSV_URL}${GOOGLE_SHEET_CSV_URL.includes('?') ? '&' : '?'}t=${Date.now()}`;

          baseUrl,
        ];

        for (const url of candidates) {
          try {
            const response = await fetchWithTimeout(url);
            if (!response.ok) throw new Error(`Falha na rede (${response.status}): ${response.statusText}`);

            if (csvText && csvText.trim().length > 0) break;
          } catch (e) { lastErr = e; }
        }

        if (!csvText) throw lastErr || new Error('Falha ao buscar CSV.');
        parseCSV(csvText);

        const lastUpdatedTime = new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
        fileStatus.textContent = `Planilha atualizada às ${lastUpdatedTime}.`;

        }

    function parseCSV(csvText) {
      const cleaned = csvText.replace(/^\uFEFF/, '');
      const lines = cleaned.trim().split(/\r?\n/);
      if (lines.length < 2) return;

      const parseLine = (line) => {
        const values = [];
        const regex = /("([^"]|"")*"|[^,]*)(,|$)/g;
        line.replace(regex, (match, p1) => {
          let value = p1;
          if (value.startsWith('"') && value.endsWith('"')) value = value.slice(1, -1).replace(/""/g, '"');
          values.push(value.trim());
        });
        return values;
      };

      headers = parseLine(lines[0]).map(h => h.toUpperCase().replace(/"/g, ''));

      // Helpers de mapeamento de colunas (robusto)
      const findAll = (...keys) => headers.find(h => keys.every(k => h.includes(k)));
      const findAny = (...keys) => headers.find(h => keys.some(k => h.includes(k)));

      headerMap = {
        dts: headers.find(h => h === 'DTS' || h.includes('DTS') || (h.includes('DT') && !h.includes('DATA') && !h.includes('DESC') && !h.includes('AGEN'))) || headers[0],

        canal: findAny('CANAL') || headers[1],
        cliente: findAny('CLIENTE') || headers[2],

        produto: findAny('PRODUTO', 'TIPO') || headers[3],
        descricao: findAny('DESCR') || headers[4],
        plt: findAny('PLT', 'QUANT', 'QTD') || headers[5],

        deposito: findAny('DEPOS', 'DEST') || headers[6],
        transportadora: findAny('TRANSPORT') || headers[7],

        // Data do agendamento (prioriza colunas com AGEN/AGEND)
        data:
          findAll('DATA', 'AGEN') ||
          findAll('DATA', 'AGEND') ||
          findAll('DATA', 'PROGR') ||
          findAll('DATA', 'SCHED') ||
          findAny('DATA AGENDA', 'DATA AGENDAMENTO') ||
          headers.find(h => h === 'DATA') ||
          findAny('DATA') ||
          headers[8],

        // Hora/Agenda (prioriza colunas com HORA/HORÁRIO + AGEN/AGEND)
        agenda:
          findAll('HORA', 'AGEN') ||
          findAll('HOR', 'AGEN') ||
          findAll('HORARIO', 'AGEN') ||
          findAll('HORÁRIO', 'AGEN') ||
          headers.find(h => h.includes('AGENDA') && !h.includes('DATA')) ||
          headers.find(h => (h.includes('HORA') || h.includes('HOR')) && !h.includes('DATA')) ||
          headers[11],

        // DT/ID de descarga
        descarga: findAny('DESCARG') || headers[9],

        // Segmentação / XT
        xtAdicional: findAny('XT', 'SEGMENT', 'SEGMENTO') || headers[10],

        cpf: headers.find(h => h.includes('CPF')),
        motorista: headers.find(h => h.includes('MOTORISTA')),
      };

      console.log('[HEILOG] headerMap selecionado:', headerMap);

      database = lines.slice(1).map(line => {
        if (line.trim() === '') return null;
        const values = parseLine(line);
        const entry = {};
        headers.forEach((header, j) => { entry[header] = values[j] || ''; });
        return entry;
      }).filter(Boolean);
    }

    // --- PRIORIDADE ---
    function getPriorityInfo(sheetRow) {
      let isPriority = false;
      let isOtif = false;
      let isTop18 = false;
      let isAderente = false;
      let isAntecipacao = false;
      let isGradeQueimada = false;
      let isAtrasado = false;

      if (!sheetRow) return { label: 'NORMAL', level: 0, isPriority, isOtif, isTop18, isAderente, isAntecipacao, isGradeQueimada, isAtrasado };

      const canal = (sheetRow[headerMap.canal] || '').toString().trim().toUpperCase();
      const dateStr = (sheetRow[headerMap.data] || '').toString().trim();
      const timeStr = (sheetRow[headerMap.agenda] || '').toString().trim();
      const segmento = (sheetRow[headerMap.xtAdicional] || '').toString().toUpperCase();
      isTop18 = segmento.includes('TOP18') || segmento.includes('TOP 18');

      const extractDateTime = (dStr, tStr) => {
        let d = (dStr || '').toString().trim();
        let t = (tStr || '').toString().trim();

        if (d.includes(' ') && !t) {
          const parts = d.split(' ');
          d = parts[0] || d;
          t = parts[1] || '';
        }

        t = t.replace(/\s+/g, '');
        if (t.includes('h')) t = t.replace('h', ':');

        const parseDate = (x) => {
          if (!x) return null;
          if (/^\d{2}\/\d{2}\/\d{4}$/.test(x)) {
            const [dd, mm, yyyy] = x.split('/').map(v => parseInt(v, 10));
            return new Date(yyyy, mm - 1, dd);
          }
          if (/^\d{2}-\d{2}-\d{4}$/.test(x)) {
            const [dd, mm, yyyy] = x.split('-').map(v => parseInt(v, 10));
            return new Date(yyyy, mm - 1, dd);
          }
          if (/^\d{4}-\d{2}-\d{2}$/.test(x)) {
            const [yyyy, mm, dd] = x.split('-').map(v => parseInt(v, 10));
            return new Date(yyyy, mm - 1, dd);
          }
          if (/^\d{4}\/\d{2}\/\d{2}$/.test(x)) {
            const [yyyy, mm, dd] = x.split('/').map(v => parseInt(v, 10));
            return new Date(yyyy, mm - 1, dd);
          }
          const dn = new Date(x);
          return Number.isNaN(dn.getTime()) ? null : dn;
        };

        const baseDate = parseDate(d);
        if (!baseDate) return null;

        let hh = 0, mi = 0, ss = 0;
        if (t && t.includes(':')) {
          const parts = t.split(':');
          hh = parseInt(parts[0], 10);
          mi = parseInt(parts[1] || '0', 10);
          ss = parseInt(parts[2] || '0', 10);
          if ([hh, mi, ss].some(n => Number.isNaN(n))) { hh = 0; mi = 0; ss = 0; }
        } else if (t && /^\d{1,2}$/.test(t)) {
          hh = parseInt(t, 10);
          if (Number.isNaN(hh)) hh = 0;
        }

        return new Date(baseDate.getFullYear(), baseDate.getMonth(), baseDate.getDate(), hh, mi, ss);
      };

      const scheduledDateTime = extractDateTime(dateStr, timeStr);
      if (!scheduledDateTime) {
        return { label: 'NORMAL', level: 0, isPriority, isOtif, isTop18, isAderente, isAntecipacao, isGradeQueimada, isAtrasado };
      }

      const OTIF_CANAIS = new Set(['Y001','Y002','Y055']);
      const ADERENTE_CANAIS = new Set(['Y004','Y006']);

      isOtif = OTIF_CANAIS.has(canal);
      isAderente = ADERENTE_CANAIS.has(canal);

      const now = new Date();
      const today = new Date(now); today.setHours(0, 0, 0, 0);
      const scheduledDay = new Date(scheduledDateTime); scheduledDay.setHours(0, 0, 0, 0);

      if (today.getTime() > scheduledDay.getTime()) {
        isGradeQueimada = true;
        return { label: 'GRADE QUEIMADA', level: 3, isPriority: true, isOtif, isTop18, isAderente, isAntecipacao, isGradeQueimada, isAtrasado };
      }

      if (today.getTime() < scheduledDay.getTime()) {
        if (isOtif) {
          isPriority = true;
          if (isTop18) return { label: 'OTIF/TOP 18', level: 1, isPriority, isOtif, isTop18, isAderente, isAntecipacao, isGradeQueimada, isAtrasado };
          return { label: 'OTIF', level: 1, isPriority, isOtif, isTop18, isAderente, isAntecipacao, isGradeQueimada, isAtrasado };
        }
        if (isAderente) {
          isPriority = true;
          return { label: 'ADERENTE', level: 1, isPriority, isOtif, isTop18, isAderente, isAntecipacao, isGradeQueimada, isAtrasado };
        }
        return { label: 'NORMAL', level: 0, isPriority, isOtif, isTop18, isAderente, isAntecipacao, isGradeQueimada, isAtrasado };
      }

      const plannedHour = scheduledDateTime.getHours();
      if (plannedHour >= 20 && plannedHour <= 23) {
        isAntecipacao = true;
        isPriority = true;
        return { label: 'ANTECIPAÇÃO', level: 1, isPriority, isOtif, isTop18, isAderente, isAntecipacao, isGradeQueimada, isAtrasado };
      }

      const diffMs = now.getTime() - scheduledDateTime.getTime();

      if (diffMs > (60 * 60 * 1000)) {
        isAtrasado = true;
        return { label: 'PERDA DE AGENDA', level: 2, isPriority: true, isOtif, isTop18, isAderente, isAntecipacao, isGradeQueimada, isAtrasado };
      }

      if (isOtif) {
        isPriority = true;
        if (isTop18) return { label: 'OTIF/TOP 18', level: 1, isPriority, isOtif, isTop18, isAderente, isAntecipacao, isGradeQueimada, isAtrasado };
        return { label: 'OTIF', level: 1, isPriority, isOtif, isTop18, isAderente, isAntecipacao, isGradeQueimada, isAtrasado };
      }

      if (isAderente) {
        isPriority = true;
        return { label: 'ADERENTE', level: 1, isPriority, isOtif, isTop18, isAderente, isAntecipacao, isGradeQueimada, isAtrasado };
      }

      return { label: 'NORMAL', level: 0, isPriority, isOtif, isTop18, isAderente, isAntecipacao, isGradeQueimada, isAtrasado };
    }

    function computeTransportOperationLabel() {
      const mode = (currentMode || '').toString().trim().toUpperCase();

      const presetTypeUp = presetType.toUpperCase();
      const transp = (presetTransportadora || '').toString().trim().toUpperCase();

        'LATAS VAZIAS': 'Descarga de Latas',
        'BULK': 'Descarga de Bulk',
        'PALETES VAZIO': 'Descarga de Paletes',
        'PALETES VAZIOS': 'Descarga de Paletes',

        'PRODUTO ACABADO': 'Descarga de Produto Acabado',
        'INSUMO': 'Descarga de Insumo',
      };

      if (mode === 'LOAD') {
        return loadAlsoUnload ? 'Carga e Descarga' : 'Carregamento';
      }

      if (mode === 'UNLOAD') {
        if (unloadMap[presetTypeUp]) return unloadMap[presetTypeUp];
        if (presetTypeUp) return `Descarga de ${toTitleCase(presetTypeUp)}`;
        return 'Descarga';
      }

      if (mode === 'RITMO') {
        return transp ? `Baldeio - ${transp}` : 'Baldeio';
      }

      if (mode === 'HIDROMAN') return 'Hidroman';
      if (mode === 'INTEGRACAO') return 'Integração';

      if (presetTypeUp) {
        if (unloadMap[presetTypeUp]) return unloadMap[presetTypeUp];
        if (presetTypeUp === 'BALDEIO') return transp ? `Baldeio - ${transp}` : 'Baldeio';
        if (presetTypeUp === 'HIDROMAN') return 'Hidroman';
      }

      return 'Operação';
    }

            isPriority: !!pInfo.isPriority,
            isOtif: !!pInfo.isOtif,
            isTop18: !!pInfo.isTop18,
            isAderente: !!pInfo.isAderente,
            isAntecipacao: !!pInfo.isAntecipacao,
            isGradeQueimada: !!pInfo.isGradeQueimada,
            isAtrasado: !!pInfo.isAtrasado,
            updatedAt: new Date().toISOString(),
          }
        };

        await setDoc(patioDocRef, patioDataToSave, { merge: true });
        return true;
      } catch (error) {
        console.error("Erro ao salvar operação no pátio:", error);
        displayError(`Ocorreu um erro ao salvar a operação no painel: Verifique suas permissões.`, 5000);
        return false;
      }
    }

    async function findAndFillDriverData(event) {
      const cpfInput = event.target;
      const unmaskedCpf = normalizeDigits(cpfInput.value);
      if (unmaskedCpf.length !== 11) return;
      if (!isAuthReady) return;

      const driverRef = doc(db, 'artifacts', appId, 'public', 'data', 'drivers', unmaskedCpf);
      try {
        const docSnap = await getDoc(driverRef);
        if (docSnap.exists()) {
          fillFormFields(docSnap.data());
        } else {
          const localData = localStorage.getItem(`heilo-driver-${unmaskedCpf}`);
          if (localData) fillFormFields(JSON.parse(localData));
        }
      } catch (error) {
        console.error("Erro ao buscar motorista no Firebase:", error);
        displayError("Erro ao consultar o banco de dados de motoristas.", 4000);
      }
    }

    async function loadDriverByCpf(cpfDigits) {
      const cpf = normalizeDigits(cpfDigits);
      if (cpf.length !== 11 || !db) return null;

      try {
        const ref = doc(db, 'artifacts', appId, 'public', 'data', 'drivers', cpf);
        const snap = await getDoc(ref);
        if (snap.exists()) return snap.data();
      } catch (e) {
        console.warn("Falha ao buscar motorista no Firestore:", e);
      }

      try {
        const cached = localStorage.getItem(`heilo-driver-${cpf}`);
        if (cached) return JSON.parse(cached);
      } catch {}
      return null;
    }

    async function saveDriverOnly(driverData) {
      if (!isAuthReady || !db || !appId) return false;
      const unmaskedCpf = normalizeDigits(driverData.cpf);
      if (unmaskedCpf.length !== 11) return false;

      try {
        const driverDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'drivers', unmaskedCpf);
        const payload = {
          name: driverData.name || '',
          cpf: unmaskedCpf,
          phone: normalizeDigits(driverData.phone || ''),
          cnh: driverData.cnh || '',
          cnhExpiry: driverData.cnhExpiry || '',
          truckPlate: (driverData.truckPlate || '').toString().toUpperCase(),
          trailerPlate: (driverData.trailerPlate || '').toString().toUpperCase(),
          vehicleType: driverData.vehicleType || '',
          axles: driverData.axles || '',
          renavam: driverData.renavam || '',
          transportadora: driverData.transportadora || '',
          lastUpdate: new Date().toISOString()
        };
        await setDoc(driverDocRef, payload, { merge: true });
        try { localStorage.setItem(`heilo-driver-${unmaskedCpf}`, JSON.stringify(payload)); } catch {}
        return true;
      } catch (e) {
        console.error("Erro ao salvar cadastro:", e);
        return false;
      }
    }

    async function startIntegrationFlow(cpfMasked, { autoStartTest = true } = {}) {
      currentMode = 'INTEGRACAO';
      renderModeForm('INTEGRACAO');

      setTimeout(() => {
        const intCpf = document.getElementById('int-cpf');
        if (intCpf) intCpf.value = cpfMasked;
        document.getElementById('int-check')?.click();

        if (autoStartTest) {
          setTimeout(() => {
            const st = document.getElementById('int-start');
            if (st) st.click();
          }, 250);
        }
      }, 0);
    }

      } catch {}

      const go = async () => {
        await unlockAudio();

        sessionCpf = cpf;
        try { localStorage.setItem('heilog-last-cpf', cpfMasked); } catch {}

        fileStatus.textContent = 'Verificando cadastro e integração...';

        sessionDriver = await loadDriverByCpf(cpf);

        const st = await getIntegrationStateForCpf(cpf);

        if (sessionDriver && st.ok) {
          fileStatus.textContent = 'Tudo certo. Bem-vindo!';
          renderActionSelector();
          return;
        }

        if (!sessionDriver) {
          renderRegistrationForm(cpfMasked);
          return;
        }

        fileStatus.textContent = 'Integração necessária.';
        postIntegrationNavigate = () => { renderActionSelector(); };
        await startIntegrationFlow(cpfMasked, { autoStartTest: true });
      };

      document.getElementById('gate-go')?.addEventListener('click', go);

    async function loadIntegrationDoc(cpf) {
      const cacheKey = `heilog-integration-${cpf}`;
      const ref = doc(db, 'artifacts', appId, 'public', 'data', 'integrations', cpf);
      try {
        const snap = await getDoc(ref);
        if (snap.exists()) {
          const data = snap.data();
          try { localStorage.setItem(cacheKey, JSON.stringify(data)); } catch {}
          return data;
        }
      } catch (e) {
        console.warn("Falha ao ler integration doc:", e);
      }

      try {
        const cached = localStorage.getItem(cacheKey);
        if (cached) return JSON.parse(cached);
      } catch {}
      return null;
    }

    async function saveIntegrationDoc(cpf, patch) {
      const ref = doc(db, 'artifacts', appId, 'public', 'data', 'integrations', cpf);
      await setDoc(ref, patch, { merge: true });
      try {
        const current = await loadIntegrationDoc(cpf) || {};
        const merged = { ...current, ...patch };
        localStorage.setItem(`heilog-integration-${cpf}`, JSON.stringify(merged));
      } catch {}
    }

    function computeIntegrationStatus(docData) {
      const now = new Date();
      if (!docData || !docData.nextDueAt) {
        return { state: 'NEW', now };
      }
      const due = toDateMaybe(docData.nextDueAt);
      if (!due) return { state: 'NEW', now };

      const warn = addDays(now, INTEGRATION_WARN_DAYS);
      if (now > due) return { state: 'EXPIRED', now, due };
      if (warn >= due) return { state: 'EXPIRING', now, due };
      return { state: 'VALID', now, due };
    }

    function isIntegrationAccepted(state) {
      return state === 'VALID' || state === 'EXPIRING';
    }

    async function getIntegrationStateForCpf(cpfDigits) {
      const cpf = normalizeDigits(cpfDigits);
      if (cpf.length !== 11) return { ok: false, state: 'INVALID' };

      const data = await loadIntegrationDoc(cpf);
      const status = computeIntegrationStatus(data);
      const due = status.due || null;

      const ok = isIntegrationAccepted(status.state);
      return { ok, state: status.state, due, data };
    }

    function formatDateBR(d) {
      try { return d ? d.toLocaleDateString('pt-BR') : ''; } catch { return ''; }
    }

    async function renderIntegrationStatus(cpf) {
      const host = document.getElementById('int-status');
      if (!host) return;

      host.innerHTML = `<div class="text-xs text-gray-300">Consultando status...</div>`;

      const data = await loadIntegrationDoc(cpf);
      const status = computeIntegrationStatus(data);

      let driverName = '';
      try {
        const driverRef = doc(db, 'artifacts', appId, 'public', 'data', 'drivers', cpf);
        const snap = await getDoc(driverRef);
        if (snap.exists()) driverName = (snap.data().name || '');
      } catch {}

      const fmt = (d) => d ? d.toLocaleDateString('pt-BR') : '—';
      const dueTxt = status.due ? fmt(status.due) : '—';

      let badge = '';
      let msg = '';
      if (status.state === 'NEW') {
        badge = `<span class="px-2 py-1 rounded bg-blue-600/70 text-white text-xs font-bold">NÃO REALIZADO</span>`;
        msg = `Precisa realizar o teste.`;
      } else if (status.state === 'EXPIRED') {
        badge = `<span class="px-2 py-1 rounded bg-red-600/70 text-white text-xs font-bold">VENCIDO</span>`;
        msg = `Integração venceu em <strong>${dueTxt}</strong>. Precisa refazer.`;
      } else if (status.state === 'EXPIRING') {
        badge = `<span class="px-2 py-1 rounded bg-yellow-500/70 text-black text-xs font-bold">VAI VENCER</span>`;
        msg = `Integração vence em <strong>${dueTxt}</strong> (faltam poucos dias).`;
      } else {
        badge = `<span class="px-2 py-1 rounded bg-green-600/70 text-white text-xs font-bold">VÁLIDO</span>`;
        msg = `Integração válida até <strong>${dueTxt}</strong>.`;
      }

      const lastScore = data?.lastScore ?? '—';
      const lastApprovedAt = toDateMaybe(data?.lastApprovedAt);
      const lastApprovedTxt = lastApprovedAt ? fmt(lastApprovedAt) : '—';
      const lastScoreNum = (typeof data?.lastScore === 'number') ? data.lastScore : parseInt(data?.lastScore, 10);
      const canRepeat = Number.isFinite(lastScoreNum) && lastScoreNum < INTEGRATION_MIN_SCORE;
      const showStartBtn = !(status.state === 'VALID' || status.state === 'EXPIRING');
      const startLabel = canRepeat ? 'Repetir teste' : 'Fazer teste';

      host.innerHTML = `
        <div class="bg-black/25 border border-white/10 rounded-xl p-4 space-y-2">
          <div class="flex items-center justify-between gap-2">
            <div class="text-sm font-bold text-white">CPF: ${cpf}</div>
            ${badge}
          </div>
          ${driverName ? `<div class="text-xs text-gray-200">Motorista: <strong>${driverName}</strong></div>` : ''}
          <div class="text-sm text-gray-200">${msg}</div>

          <div class="grid grid-cols-2 gap-2 text-xs text-gray-200 pt-2">
            <div class="bg-white/5 rounded-lg p-2"><div class="text-gray-400">Última aprovação</div><div class="font-bold">${lastApprovedTxt}</div></div>
            <div class="bg-white/5 rounded-lg p-2"><div class="text-gray-400">Última nota</div><div class="font-bold">${lastScore}</div></div>
          </div>

          <div class="flex gap-2 pt-2">
            ${showStartBtn ? `<button id="int-start" class="btn-green flex-1 py-2 rounded-lg">${startLabel}</button>` : ``}
            <button id="int-history" class="${showStartBtn ? 'btn-ghost flex-1 py-2 rounded-lg' : 'btn-ghost w-full py-2 rounded-lg'}">Histórico</button>
          </div>

          <div id="int-subview" class="pt-2"></div>
        </div>
      `;

      document.getElementById('int-start')?.addEventListener('click', async () => {
        await unlockAudio();
        renderIntegrationTest(cpf);
      });

      document.getElementById('int-history')?.addEventListener('click', async () => {
        await unlockAudio();
        renderIntegrationHistory(cpf);
      });
    }

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function renderIntegrationTest(cpf) {
      const sub = document.getElementById('int-subview');
      if (!sub) return;

      const qOrder = shuffle(integrationQuestions.map((q, idx) => ({ ...q, _id: idx })));

      sub.innerHTML = `
        <div class="bg-blue-900/30 border border-blue-700 rounded-xl p-4 space-y-3">
          <div class="flex items-center justify-between">
            <div class="text-white font-bold">Teste de Integração</div>
            <button id="int-cancel" class="btn-ghost px-3 py-1 rounded-lg text-xs">Fechar</button>
          </div>

          <form id="int-form" class="space-y-3">
            ${qOrder.map((q, i) => `
              <div class="bg-black/20 border border-white/10 rounded-xl p-3">
                <div class="text-sm font-semibold text-white mb-2">${i+1}. ${q.q}</div>
                <div class="space-y-2 text-sm text-gray-200">
                  ${q.options.map((opt, oi) => `
                    <label class="flex items-start gap-2 cursor-pointer">
                      <input type="radio" name="q_${i}" value="${oi}" class="mt-1">
                      <span>${opt}</span>
                    </label>
                  `).join('')}
                </div>
              </div>
            `).join('')}

            <button type="submit" class="btn-green w-full py-3 rounded-lg">Finalizar</button>
          </form>

          <div id="int-result" class="pt-2"></div>
        </div>
      `;

      document.getElementById('int-cancel')?.addEventListener('click', () => {
        sub.innerHTML = '';
      });

      document.getElementById('int-form')?.addEventListener('submit', async (e) => {
        e.preventDefault();

        const form = e.target;
        const answers = [];
        for (let i = 0; i < qOrder.length; i++) {
          const picked = form.querySelector(`input[name="q_${i}"]:checked`);
          if (!picked) {
            displayError("Responda todas as perguntas antes de finalizar.", 4000);
            return;
          }
          answers.push(parseInt(picked.value, 10));
        }

        let score = 0;
        for (let i = 0; i < qOrder.length; i++) {
          if (answers[i] === qOrder[i].correctIndex) score++;
        }

        const passed = score >= INTEGRATION_MIN_SCORE;
        const now = new Date();
        const nextDue = addDays(now, INTEGRATION_VALID_DAYS);

        const attempt = {
          id: generateInternalId('ATT'),
          at: now.toISOString(),
          score,
          total: qOrder.length,
          passed,
        };

        try {
          const current = await loadIntegrationDoc(cpf) || {};
          const prevAttempts = Array.isArray(current.attempts) ? current.attempts : [];
          const attempts = [attempt, ...prevAttempts].slice(0, 30);
          const patch = {
            cpf,
            lastAttemptAt: now.toISOString(),
            lastScore: score,
            attempts,
          };
          if (passed) {
            patch.lastApprovedAt = now.toISOString();
            patch.nextDueAt = nextDue.toISOString();
            patch.lastPassed = true;
          } else {
            patch.lastPassed = false;
          }

          await saveIntegrationDoc(cpf, patch);

          const resultEl = document.getElementById('int-result');
          if (resultEl) {
            resultEl.innerHTML = passed
              ? `<div class="bg-green-600/20 border border-green-500 text-green-100 p-3 rounded-lg">
                   <div class="font-bold">APROVADO ✅</div>
                   <div>Sua nota: <strong>${score}/${qOrder.length}</strong>. Válido até <strong>${nextDue.toLocaleDateString('pt-BR')}</strong>.</div>
                 </div>`
              : `<div class="bg-red-600/20 border border-red-500 text-red-100 p-3 rounded-lg">
                   <div class="font-bold">REPROVADO ❌</div>
                   <div>Sua nota: <strong>${score}/${qOrder.length}</strong>. Você pode tentar novamente.</div>
                 </div>`;
          }

          if (passed && typeof postIntegrationNavigate === 'function') {
            const cb = postIntegrationNavigate;
            postIntegrationNavigate = null;
            setTimeout(() => { try { cb(); } catch {} }, 300);
            return;
          }

          await renderIntegrationStatus(cpf);
        } catch (err) {
          console.error("Falha ao salvar tentativa:", err);
          displayError("Não consegui salvar a tentativa no Firestore. Verifique permissões/regras.", 6000);
        }
      });
    }

    function performSearchByDt(query) {
      const q = query.trim();
      if (!q) { displayError("Digite um número de DT para buscar."); return; }
      if (database.length === 0) { displayError("Os dados da planilha ainda não foram carregados."); return; }

      const results = database.filter(row => (row[headerMap.dts] || '').toString().trim().toLowerCase() === q.toLowerCase());
      if (results.length > 0) {
        const deposito = results[0][headerMap.deposito] || '';
        const normalizedDeposito = deposito.toUpperCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
        if (normalizedDeposito.includes('FABRICA')) {
          showDriverForm(results, { modeLabel: (requireUnloadDtInForm ? 'Carregamento + Descarga' : 'Carregamento'), isManualOverride: false });
        } else {
          displayStandardResults(results);
        }
      } else {
        displayNotFound(q);
      }
    }

        const manualTypeEl = document.getElementById('manual-type');
        const manualClientEl = document.getElementById('manual-client');
        const manualPltEl = document.getElementById('manual-plt');

        if (manualTypeEl && manualPresetType) manualTypeEl.value = manualPresetType;

        if (manualPltEl && hideManualExtras && !manualPltEl.value) manualPltEl.value = '';
      }

      const manualTypeEl2 = document.getElementById('manual-type');
      const manualTypeHelp = document.getElementById('manual-type-help');
      const explainType = (val) => {
        const v = (val || '').toString().toUpperCase().trim();
        if (!v) return 'Dica: se não tiver certeza, deixe em branco.';
        if (v.includes('BULK')) return 'Bulk: carga a granel (sem pallet).';
        if (v.includes('EMBALAGEM')) return 'Embalagem: material de embalagem (ex.: caixas, tampas, etc.).';
        if (v.includes('PALETES')) return 'Paletes Vazio: devolução/retorno de paletes vazios.';
        if (v.includes('LATAS VAZIAS') || v === 'LATAS') return 'Latas Vazias: retorno/recebimento de latas vazias (sem DT).';
        if (v.includes('PRODUTO ACABADO')) return 'Produto Acabado: cerveja pronta/paletizada.';
        if (v.includes('INSUMO')) return 'Insumo: matéria-prima/insumo para produção.';
        if (v.includes('BALDEIO') || v.includes('RITMO')) return 'Baldeio: transferência/ajuste de fluxo (DT opcional).';
        if (v.includes('DESCARGA')) return 'Descarga: recebimento/descarregamento.';
        if (v.includes('HIDROMAN')) return 'HIDROMAN: operação dedicada (sem planilha).';
        return 'Tipo selecionado.';
      };
      if (manualTypeEl2 && manualTypeHelp) {
        manualTypeHelp.textContent = explainType(manualTypeEl2.value);
        manualTypeEl2.addEventListener('change', () => {
          manualTypeHelp.textContent = explainType(manualTypeEl2.value);
        });
      }

      const driverTranspEl = document.getElementById('driver-transportadora');
      if (driverTranspEl && !driverTranspEl.value) {
        const fromSheet = (firstResult?.[headerMap.transportadora] || '').toString();
        driverTranspEl.value = fromSheet;
      }

      if (driverTranspEl && presetTransportadora) {
        driverTranspEl.value = presetTransportadora;
      }
      if (driverTranspEl) {
        driverTranspEl.readOnly = !!lockTransportadora;
        if (lockTransportadora) {
          driverTranspEl.classList.add('opacity-80');
        } else {
          driverTranspEl.classList.remove('opacity-80');
        }
      }

      const unloadEl = document.getElementById('unload-dt');
      if (unloadEl && pendingUnloadDt) unloadEl.value = pendingUnloadDt;

      document.getElementById('driver-cpf')?.addEventListener('input', findAndFillDriverData);

      const _intCpfEl = document.getElementById('driver-cpf');
      const _intStatusEl = document.getElementById('driver-int-status');
      const _intBadgeEl = document.getElementById('driver-int-badge');
      const _intOpenBtn = document.getElementById('driver-int-open');
      const _printBtn = document.getElementById('generate-sheet-btn');

      const setPrintEnabled = (enabled) => {
        if (!_printBtn) return;
        _printBtn.disabled = !enabled;
        _printBtn.classList.toggle('opacity-50', !enabled);
        _printBtn.classList.toggle('cursor-not-allowed', !enabled);
        if (!enabled) _printBtn.title = 'Integração obrigatória';
        else _printBtn.title = '';
      };

      let _intTimer = null;
      const refreshIntegrationUI = async () => {
        if (!_intCpfEl || !_intStatusEl || !_intBadgeEl) return;
        const cpfDigits = normalizeDigits(_intCpfEl.value);

        if (cpfDigits.length !== 11) {
          _intBadgeEl.textContent = '—';
          _intStatusEl.textContent = 'Digite o CPF completo para verificar.';
          if (_intOpenBtn) _intOpenBtn.classList.add('hidden');
          setPrintEnabled(false);
          return;
        }

        _intBadgeEl.textContent = '...';
        _intStatusEl.textContent = 'Verificando integração...';

        try {
          const st = await getIntegrationStateForCpf(cpfDigits);

          if (st.state === 'INVALID') {
            _intBadgeEl.textContent = 'CPF';
            _intStatusEl.textContent = 'CPF inválido.';
            if (_intOpenBtn) _intOpenBtn.classList.add('hidden');
            setPrintEnabled(false);
            return;
          }

          if (st.ok) {
            const dueTxt = st.due ? formatDateBR(st.due) : '';
            _intBadgeEl.textContent = (st.state === 'EXPIRING') ? 'ALERTA' : 'OK';
            _intStatusEl.textContent = st.state === 'EXPIRING'
              ? `Integração OK (vence em ${dueTxt}).`
              : `Integração OK (até ${dueTxt}).`;
            if (_intOpenBtn) _intOpenBtn.classList.add('hidden');
            setPrintEnabled(true);
          } else {
            const dueTxt = st.due ? formatDateBR(st.due) : '';
            _intBadgeEl.textContent = 'BLOQUEADO';
            _intStatusEl.textContent = st.state === 'EXPIRED'
              ? `Vencida em ${dueTxt}. Faça o teste para liberar.`
              : 'Não encontrada. Faça o teste para liberar.';
            if (_intOpenBtn) _intOpenBtn.classList.remove('hidden');
            setPrintEnabled(false);
          }
        } catch (e) {
          console.warn('Falha ao verificar integração:', e);
          _intBadgeEl.textContent = 'ERRO';
          _intStatusEl.textContent = 'Falha ao verificar. Tente novamente (ou faça o teste).';
          if (_intOpenBtn) _intOpenBtn.classList.remove('hidden');
          setPrintEnabled(false);
        }
      };

      if (_intCpfEl) {
        _intCpfEl.addEventListener('input', () => {
          if (_intTimer) clearTimeout(_intTimer);
          _intTimer = setTimeout(refreshIntegrationUI, 350);
        });
        _intCpfEl.addEventListener('blur', refreshIntegrationUI);
      }

      if (_intOpenBtn) {
        _intOpenBtn.addEventListener('click', async () => {
          await unlockAudio();
          const cpfMasked = _intCpfEl?.value || '';
          currentMode = 'INTEGRACAO';
          renderModeForm('INTEGRACAO');
          setTimeout(() => {
            const intCpf = document.getElementById('int-cpf');
            if (intCpf) intCpf.value = cpfMasked;
            document.getElementById('int-check')?.click();
          }, 0);
        });
      }

      setTimeout(refreshIntegrationUI, 0);

      document.getElementById('generate-sheet-btn')?.addEventListener('click', () => {
        unlockAudio();
        generateAndPrintSheet(dataArray, { isManual });
      });
    }

      const phoneEl = document.getElementById('driver-phone');
      if (phoneEl) phoneMask = IMask(phoneEl, { mask: '(00) 00000-0000' });

      const plateEl = document.getElementById('truck-plate');

          e.target.value = e.target.value.toUpperCase();

        trailerEl.addEventListener('input', (e) => {

    function fillFormFields(data) {
      document.getElementById('driver-name').value = data.name || '';
      document.getElementById('driver-cnh').value = data.cnh || '';
      document.getElementById('cnh-expiry').value = data.cnhExpiry || '';
      document.getElementById('truck-plate').value = data.truckPlate || '';
      document.getElementById('trailer-plate').value = data.trailerPlate || '';
      document.getElementById('truck-axles').value = data.axles || '';
      const vehicleTypeEl = document.getElementById('vehicle-type');
      if (vehicleTypeEl) vehicleTypeEl.value = data.vehicleType || '';
      document.getElementById('driver-renavam').value = data.renavam || '';

      const transpEl = document.getElementById('driver-transportadora');
      if (transpEl && data.transportadora) transpEl.value = data.transportadora;

      if (phoneMask && data.phone) phoneMask.unmaskedValue = normalizeDigits(data.phone);
      else if (document.getElementById('driver-phone') && data.phone) document.getElementById('driver-phone').value = data.phone;
    }

    function validateField(element, errorMessage, condition = () => element.value.trim() !== '') {
      if (!condition()) {
        element.classList.add('invalid');
        displayError(errorMessage, 4000);
        element.focus();
        return false;
      }
      element.classList.remove('invalid');
      return true;
    }

    function openPlateConfirmModal(truckPlate, trailerPlate) {
      return new Promise((resolve) => {
        const plateConfirmOverlay = document.getElementById('plate-confirm-overlay');
        const confirmTruckPlate = document.getElementById('confirm-truck-plate');
        const confirmTrailerPlate = document.getElementById('confirm-trailer-plate');
        const plateConfirmEditBtn = document.getElementById('plate-confirm-edit-btn');
        const plateConfirmPrintBtn = document.getElementById('plate-confirm-print-btn');

        if (
          !plateConfirmOverlay ||
          !confirmTruckPlate ||
          !confirmTrailerPlate ||
          !plateConfirmEditBtn ||
          !plateConfirmPrintBtn
        ) {
          console.error('Modal de confirmação das placas não encontrado no DOM.');
          resolve(true);
          return;
        }

        confirmTruckPlate.textContent = (truckPlate || 'NÃO INFORMADO').toUpperCase();
        confirmTrailerPlate.textContent = (trailerPlate || 'NÃO INFORMADO').toUpperCase();

        plateConfirmOverlay.style.display = 'flex';

        const cleanup = () => {
          plateConfirmOverlay.style.display = 'none';
          plateConfirmEditBtn.onclick = null;
          plateConfirmPrintBtn.onclick = null;
          plateConfirmOverlay.onclick = null;
          document.removeEventListener('keydown', escHandler);
        };

        const escHandler = (e) => {
          if (e.key === 'Escape') {
            cleanup();
            resolve(false);
          }
        };

        plateConfirmEditBtn.onclick = () => {
          cleanup();
          resolve(false);
        };

        plateConfirmPrintBtn.onclick = () => {
          cleanup();
          resolve(true);
        };

        plateConfirmOverlay.onclick = (e) => {
          if (e.target === plateConfirmOverlay) {
            cleanup();
            resolve(false);
          }
        };

        document.addEventListener('keydown', escHandler);
      });
    }

    async function generateAndPrintSheet(originalDataArray, { isManual }) {
      const nameEl = document.getElementById('driver-name');
      const cpfEl = document.getElementById('driver-cpf');
      const phoneEl = document.getElementById('driver-phone');
      const plateEl = document.getElementById('truck-plate');

      if (!validateField(nameEl, "Nome do motorista é obrigatório.")) return;
      if (!validateField(cpfEl, "CPF é obrigatório.", () => cpfMask?.unmaskedValue?.length === 11)) return;

      try {
        const cpfDigits = normalizeDigits(cpfEl.value);
        const st = await getIntegrationStateForCpf(cpfDigits);
        if (!st.ok) {
          displayError("Integração obrigatória: faça o teste antes de imprimir.", 6000);
          document.getElementById('driver-int-open')?.classList.remove('hidden');
          return;
        }
      } catch (e) {
        console.warn('Erro ao validar integração antes do print:', e);
        displayError("Não consegui validar a integração agora. Tente novamente.", 6000);
        return;
      }

      if (!validateField(phoneEl, "Telefone é obrigatório.", () => (phoneMask?.unmaskedValue?.length || 0) >= 10)) return;
      if (!validateField(plateEl, "Placa do cavalo é obrigatória.")) return;
      const vehicleTypeEl = document.getElementById('vehicle-type');
      if (vehicleTypeEl && !validateField(vehicleTypeEl, "Tipo de veículo é obrigatório.")) return;
      const cnhEl = document.getElementById('driver-cnh');
      if (cnhEl && !validateField(cnhEl, "CNH é obrigatória.")) return;

      const unloadDtEl = document.getElementById('unload-dt');
      if (requireUnloadDtInForm && unloadDtEl) {
        if (!validateField(unloadDtEl, "DT de descarga é obrigatória.", () => unloadDtEl.value.trim().length > 0)) return;
      }

      const trailerEl = document.getElementById('trailer-plate');
      const confirmedPlates = await openPlateConfirmModal(
        (plateEl?.value || '').trim().toUpperCase(),
        (trailerEl?.value || '').trim().toUpperCase()
      );

      if (!confirmedPlates) {
        plateEl?.focus();
        return;
      }

      const firstOriginal = originalDataArray[0] || {};
      const baseDt = String(firstOriginal[headerMap.dts] || '').trim();
      const dtFromOverride = String(manualDtIdOverride || '').trim();
      const dtToUse = dtFromOverride || baseDt || generateInternalId('SEM_DT');
      const formUnloadDt = (document.getElementById('unload-dt')?.value || pendingUnloadDt || baldeioDtDescarga || '').trim();

      let printableDt = '';
      let printableUnloadDt = '';

      if (currentMode === 'LOAD') {
        printableDt = baseDt || (/^\d+$/.test(dtFromOverride) ? dtFromOverride : '');
        printableUnloadDt = formUnloadDt;
      } else if (currentMode === 'RITMO') {
        printableDt = (baldeioDtCarga || '').trim();
        printableUnloadDt = (baldeioDtDescarga || '').trim();
      }

      const driverData = {
        name: nameEl.value,
        cpf: cpfEl.value,
        phone: phoneEl.value,
        cnh: document.getElementById('driver-cnh')?.value || '',
        cnhExpiry: document.getElementById('cnh-expiry')?.value || '',
        truckPlate: plateEl.value,
        trailerPlate: document.getElementById('trailer-plate')?.value || '',
        vehicleType: document.getElementById('vehicle-type')?.value || '',
        axles: document.getElementById('truck-axles')?.value || '',
        renavam: document.getElementById('driver-renavam')?.value || '',
        invoice: (document.getElementById('invoice-number')?.value || ''),
        unloadDt: formUnloadDt,
        printableDt,
        printableUnloadDt,
        registrationTime: Date.now(),
        dts: dtToUse,
        transportadora: ((document.getElementById('driver-transportadora')?.value || '').toString().trim())
      };

      driverData.operacao = computeTransportOperationLabel();

      if ((presetTransportadora || '').toString().trim().toUpperCase() === 'HIDROMAN') {
        driverData.transportadora = 'HIDROMAN';
      }

      const sheetData = isManual ? [{
        ...firstOriginal,
        [headerMap.dts]: dtToUse,
        [headerMap.cliente]: (document.getElementById('manual-client')?.value || ''),
        [headerMap.produto]: (document.getElementById('manual-type')?.value || manualPresetType || ''),
        [headerMap.plt]: (document.getElementById('manual-plt')?.value || ''),
        [headerMap.transportadora]: (document.getElementById('driver-transportadora')?.value || ''),
        [headerMap.canal]: (document.getElementById('manual-canal')?.value || ''),
        [headerMap.deposito]: 'FÁBRICA'
      }] : originalDataArray;

      const firstRowForPriority = sheetData[0] || {};
      const priorityInfo = getPriorityInfo(firstRowForPriority);

      buildPrintableSheet(
        driverData,
        sheetData,
        priorityInfo.isPriority,
        priorityInfo.isOtif,
        priorityInfo.isTop18,
        priorityInfo.isAntecipacao,
        priorityInfo.isGradeQueimada,
        priorityInfo.isAtrasado,
        isManual
      );

      let afterPrintFired = false;
      const afterPrint = async () => {
        if (afterPrintFired) return;
        afterPrintFired = true;

        const isSaved = await saveDriverData(driverData, firstRowForPriority, priorityInfo);
        if (!isSaved) displayError('Não consegui salvar no painel agora, mas a folha foi impressa.', 7000);
        showCallPanel(driverData.name, priorityInfo.isPriority || priorityInfo.isGradeQueimada || priorityInfo.isAtrasado);

        try { document.getElementById('printable-area').innerHTML = ''; } catch {}
        window.onafterprint = null;
      };

      window.onafterprint = () => { afterPrint(); };
      try { document.getElementById('printable-area').offsetHeight; } catch {}

      try { window.print(); }
      catch (e) {
        console.error('Falha ao abrir impressão:', e);
        displayError('Não consegui abrir a impressão. Verifique se o navegador está bloqueando a janela de impressão.', 8000);
      }

      setTimeout(() => { if (!afterPrintFired) afterPrint(); }, 1500);
    }

    
    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

function showCallPanel(driverName, isAlert) {
      clearTimeout(panelTimeout);
      callPanelMessage.innerHTML = `ATENÇÃO ${driverName},<br>Aguarde a ser chamado, iremos mandar mensagem no celular`;

      if (isAlert) {
        callPanelContent.style.backgroundColor = '#fecaca';
        playSound(true);
      } else {
        callPanelContent.style.backgroundColor = '#e5e7eb';
        playSound(false);
      }

      callPanelOverlay.style.display = 'flex';
      panelTimeout = setTimeout(resetApp, 7000);
    }

    function playSound(isPrioritySound) {
      if (!audioUnlocked) return;
      const synth = new Tone.Synth().toDestination();
      if (isPrioritySound) {
        synth.triggerAttackRelease("C5", "8n", Tone.now());
        synth.triggerAttackRelease("G5", "8n", Tone.now() + 0.2);
      } else {
        synth.triggerAttackRelease("C4", "8n", Tone.now());
      }
    }

    function resetApp() {
      callPanelOverlay.style.display = 'none';
      const plateConfirmOverlay = document.getElementById('plate-confirm-overlay');
      if (plateConfirmOverlay) plateConfirmOverlay.style.display = 'none';
      resultsArea.innerHTML = '';
      try { actionArea.innerHTML = ''; } catch {}

      sessionCpf = '';
      sessionDriver = null;
      try { localStorage.removeItem('heilog-last-cpf'); } catch {}
      currentMode = null;
      pendingUnloadDt = '';
      requireUnloadDtInForm = false;
      manualPresetType = '';
      manualDtIdOverride = '';
      hideManualExtras = false;
      showUnloadInputs = true;

      renderCpfGate();
      clearTimeout(panelTimeout);
    }

    function displayError(message, duration = 0) {
      document.getElementById('temp-alert')?.remove();
      const alertDiv = document.createElement('div');
      alertDiv.id = 'temp-alert';
      alertDiv.className = 'bg-red-500 text-white p-3 rounded-lg mb-4 text-center';
      alertDiv.textContent = message;
      resultsArea.insertAdjacentElement('afterbegin', alertDiv);
      if (duration > 0) setTimeout(() => alertDiv.remove(), duration);
    }

    function displayNotFound(query) {
      resultsArea.innerHTML = `
        <div class="bg-yellow-900/50 border border-yellow-700 text-yellow-300 p-4 rounded-xl text-center">
          <p class="font-semibold">DT "${query}" não encontrado na planilha.</p>
          <button id="manual-form-btn" class="mt-4 bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-lg transition-all">
            Criar Folha de Marcação Manual
          </button>
        </div>
      `;
      document.getElementById('manual-form-btn')?.addEventListener('click', async () => {
        await unlockAudio();
        manualPresetType = '';
        hideManualExtras = false;
        showUnloadInputs = !!loadAlsoUnload;
        presetTransportadora = '';
        lockTransportadora = false;
        baldeioDtCarga = '';
        baldeioDtDescarga = '';
        requireUnloadDtInForm = false;
        manualDtIdOverride = normalizeDtId(query) || generateInternalId('MANUAL');
        showDriverForm([{ [headerMap.dts]: manualDtIdOverride }], { modeLabel: 'Marcação Manual', isManualOverride: true });
      });
    }

    closePanelBtn.addEventListener('click', resetApp);
    callPanelOverlay.addEventListener('click', (e) => { if (e.target === callPanelOverlay) resetApp(); });
    window.addEventListener('load', initializeAppLogic);
  </script>
</body>
</html>
